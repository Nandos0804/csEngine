<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>csEngine demo</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 40rem;
        margin: 4rem auto;
        padding: 0 1rem;
        color: #222;
      }
      button {
        font-size: 1rem;
        padding: 0.6rem 1.2rem;
        margin-right: 0.5rem;
        margin-top: 1rem;
        cursor: pointer;
      }
      button:disabled {
        cursor: not-allowed;
        opacity: 0.5;
      }
      #status {
        margin-top: 1rem;
        font-family: monospace;
        color: #555;
      }
    </style>
  </head>
  <body>
    <h1>csEngine</h1>
    <p>
      Reference demo: poscil3 instrument, driven by the same JSON payload shape
      used to integrate alongside an RNBO session.
    </p>

    <button id="start-btn">Start Csound engine</button>
    <button id="tone-btn" disabled>Trigger note</button>
    <button id="stop-btn" disabled>Stop Csound engine</button>

    <p>
      <label for="amp-slider">amp (poscil3_instr01_kamp)</label><br />
      <input
        id="amp-slider"
        type="range"
        min="0"
        max="1"
        step="0.01"
        value="0.3"
        disabled
      />
    </p>
    <p>
      <label for="freq-slider">freq (poscil3_instr01_kcps)</label><br />
      <input
        id="freq-slider"
        type="range"
        min="55"
        max="1760"
        step="1"
        value="440"
        disabled
      />
    </p>

    <div id="status">
      Idle. Click "Start Csound engine" (requires a user click, per browser
      audio policy).
    </div>

    <script type="importmap">
      {
        "imports": {
          "@csound/browser/dist/csound.js": "/node_modules/@csound/browser/dist/csound.js"
        }
      }
    </script>
    <script type="module" src="./main.js"></script>
  </body>
</html>
